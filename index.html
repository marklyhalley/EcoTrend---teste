<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrend</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- Banner -->
    <div id="banner">
        <h1>EcoTrend<i class="fa-solid fa-leaf"></i></h1>
        <p>Produtos sustentáveis para um estilo de vida mais consciente.</p>
    </div>

    <div class="layout">

        <!-- Área dos produtos -->
        <div class="produtos-area">
            <h2><i class="fa-solid fa-store"></i> Produtos</h2>
            <!-- Filtros por categoria -->
            <div id="filtros">
                <button class="ativo" data-categoria="todos"><i class="fa-solid fa-border-all"></i> Todos</button>
                <button data-categoria="roupas"><i class="fa-solid fa-shirt"></i> Roupas</button>
                <button data-categoria="beleza"><i class="fa-solid fa-spa"></i> Beleza</button>
                <button data-categoria="casa"><i class="fa-solid fa-house"></i> Casa</button>
                <button data-categoria="tecnologia"><i class="fa-solid fa-bolt"></i> Tecnologia</button>
            </div>

            <!-- Filtro por preço -->
            <div id="filtro-preco">
                <label>Preco maximo: R$ <span id="valor-preco">300</span></label>
                <input type="range" id="range-preco" min="30" max="300" value="300">
            </div>

            <!-- Grid de produtos -->
            <div id="produtos"></div>

        </div>

        <!-- Carrinho lateral -->
        <div class="carrinho">
            <h2><i class="fa-solid fa-cart-shopping espacinho"></i>Carrinho</h2>
            <ul id="lista-carrinho"></ul>
            <p>Total: R$ <span id="total">0.00</span></p>
            <button onclick="limparCarrinho()">Limpar Carrinho</button>
            <div id="mensagem"></div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>

</body>

</html>
